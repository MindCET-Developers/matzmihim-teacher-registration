<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מצמיחים - הרשמה מרובה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <div class="header-brand">
      <img src="https://matzmichim.org.il/wp-content/uploads/2025/06/Artboard-3.png" alt="מצמיחים" style="height:48px;width:auto" />
      <div>
        <h1>מצמיחים - הרשמה מרובה</h1>
        <p>הוספת מורים מרובים על-ידי מנחה או מנהל</p>
      </div>
    </div>
    <a class="back-link" href="index.html">← חזרה לטופס הרשמה בודדת</a>
  </div>

  <div class="panel">
    <div class="panel-title">הגדרות משותפות לכל הרשומות</div>
    <div class="shared-grid">
      <div class="field">
        <label for="sharedRegType">סוג הרשמה *</label>
        <select id="sharedRegType">
          <option value="">בחר</option>
          <option value="school">סדנא (דרך בית ספר)</option>
          <option value="course">קורס / השתלמות</option>
        </select>
      </div>
      <div class="field" id="sharedSchoolWrap" style="display:none">
        <label for="sharedSchool">בית ספר *</label>
        <select id="sharedSchool" disabled><option value="">טוען...</option></select>
      </div>
      <div class="field" id="sharedCourseWrap" style="display:none">
        <label for="sharedCourse">שם ההשתלמות *</label>
        <select id="sharedCourse" disabled><option value="">טוען...</option></select>
      </div>
    </div>
  </div>

  <div class="table-panel">
    <div class="table-scroll">
      <table id="bulkTable">
        <thead id="bulkHead"></thead>
        <tbody id="bulkBody"></tbody>
      </table>
    </div>
    <p class="paste-hint">העתיקו שורות מ-Excel והדביקו לתוך הטבלה. ייפתח חלון מיפוי עמודות.</p>
  </div>

  <div class="bottom-bar">
    <button class="btn-add-row" id="btnAddRow" type="button">+ הוסף שורה</button>
    <button class="btn-submit-all" id="btnSubmitAll" type="button">
      <span class="spinner-sm"></span>
      <span class="submit-text">רשום את כולם</span>
    </button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel"></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="global-error" id="globalError"></div>
  <div class="summary" id="summary"><h3>סיכום שליחה</h3><div id="summaryBody"></div></div>
</div>

<div class="modal-overlay" id="mapModal">
  <div class="modal">
    <h2>מיפוי עמודות מ-Excel</h2>
    <p>התאימו כל עמודה מהקובץ לשדה בטופס.</p>
    <div class="modal-preview" id="mapPreview"></div>
    <div class="map-grid" id="mapGrid"></div>
    <div class="modal-actions">
      <button class="btn" id="btnApplyMapping" type="button">ייבא נתונים</button>
      <button class="btn-secondary" id="btnCloseMapping" type="button">ביטול</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="assets/api.js"></script>
<script src="assets/form-config.js"></script>
<script src="assets/dynamic-form.js"></script>
<script>
  var formFields = [];
  var rowCount = 0;
  var pastedRows = [];
  var pastedHeaders = [];
  var entityCache = { school: [], course: [] };

  function showError(message) {
    var el = document.getElementById('globalError');
    el.textContent = message;
    el.classList.add('show');
  }

  function clearError() {
    document.getElementById('globalError').classList.remove('show');
  }

  async function loadEntities(type) {
    if (entityCache[type].length) return entityCache[type];
    entityCache[type] = await MatzmihimApi.getEntities(type);
    return entityCache[type];
  }

  async function populateEntity(type) {
    var select = document.getElementById(type === 'school' ? 'sharedSchool' : 'sharedCourse');
    select.disabled = true;
    select.innerHTML = '<option value="">טוען...</option>';
    var rows = await loadEntities(type);
    select.innerHTML = '<option value="">בחר</option>';
    rows.forEach(function (row) {
      var opt = document.createElement('option');
      opt.value = row.id;
      opt.textContent = row.name + (row.remaining <= 0 ? ' (אין הרשאות פנויות)' : '');
      opt.disabled = row.remaining <= 0;
      select.appendChild(opt);
    });
    select.disabled = false;
  }

  document.getElementById('sharedRegType').addEventListener('change', function () {
    var val = this.value;
    document.getElementById('sharedSchoolWrap').style.display = val === 'school' ? '' : 'none';
    document.getElementById('sharedCourseWrap').style.display = val === 'course' ? '' : 'none';
    if (val) populateEntity(val).catch(function (err) { showError(err.message); });
  });

  function renderHeader() {
    var html = '<tr><th>#</th>';
    formFields.forEach(function (field) {
      html += '<th>' + DynamicForm.escapeHtml(field.label) + (field.required ? ' *' : '') + '</th>';
    });
    html += '<th></th></tr>';
    document.getElementById('bulkHead').innerHTML = html;
  }

  function addRow(data) {
    data = data || {};
    rowCount++;
    var tr = document.createElement('tr');
    tr.dataset.rowId = rowCount;
    var html = '<td style="text-align:center;color:#9aabb8;font-size:0.8rem;padding-top:0.6rem">' + rowCount + '</td>';
    formFields.forEach(function (field) {
      html += '<td>' + DynamicForm.bulkInputHtml(field, data[field.key] || data[field.airtableField] || '') + '</td>';
    });
    html += '<td><button class="btn-danger" type="button" title="מחק שורה">מחק</button></td>';
    tr.innerHTML = html;
    tr.querySelector('.btn-danger').addEventListener('click', function () { tr.remove(); });
    document.getElementById('bulkBody').appendChild(tr);
  }

  function collectRows() {
    var entries = [];
    var ok = true;
    [].slice.call(document.querySelectorAll('#bulkBody tr')).forEach(function (tr) {
      var result = DynamicForm.collectBulkRow(tr, formFields);
      if (!result.hasAny) return;
      if (!result.ok) ok = false;
      entries.push({ tr: tr, values: result.values, fields: MatzmihimConfig.toPayload(formFields, result.values) });
    });
    return { ok: ok, entries: entries };
  }

  async function submitAll() {
    clearError();
    var regType = document.getElementById('sharedRegType').value;
    var entityId = regType === 'school' ? document.getElementById('sharedSchool').value : document.getElementById('sharedCourse').value;
    if (!regType) return showError('יש לבחור סוג הרשמה.');
    if (!entityId) return showError('יש לבחור בית ספר או השתלמות.');

    var collected = collectRows();
    if (!collected.ok) return showError('יש שדות חסרים או שגויים בטבלה.');
    if (!collected.entries.length) return showError('אין שורות למשלוח.');

    var btn = document.getElementById('btnSubmitAll');
    btn.disabled = true;
    btn.classList.add('sending');
    btn.querySelector('.submit-text').textContent = 'שולח...';
    document.getElementById('progressWrap').classList.add('show');
    document.getElementById('progressFill').style.width = '20%';
    document.getElementById('progressLabel').textContent = 'שולח ' + collected.entries.length + ' רשומות...';

    try {
      var response = await MatzmihimApi.submitBulkRegistrations({
        regType: regType,
        entityId: entityId,
        rows: collected.entries.map(function (entry) { return { fields: entry.fields }; }),
      });

      response.results.forEach(function (result, idx) {
        var tr = collected.entries[idx].tr;
        tr.classList.toggle('row-ok', result.ok);
        tr.classList.toggle('row-fail', !result.ok);
      });

      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressLabel').textContent = response.succeeded + ' / ' + collected.entries.length + ' נשמרו';
      renderSummary(response);
    } catch (err) {
      showError(err.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('sending');
      btn.querySelector('.submit-text').textContent = 'רשום את כולם';
    }
  }

  function renderSummary(response) {
    var body = '<div class="summary-row ok">' + response.succeeded + ' רשומות נשמרו בהצלחה</div>';
    if (response.failed) body += '<div class="summary-row fail">' + response.failed + ' רשומות נכשלו</div>';
    if (Number.isFinite(response.remaining)) body += '<div class="summary-row">נותרו ' + response.remaining + ' הקצאות.</div>';
    response.results.filter(function (r) { return !r.ok; }).forEach(function (r) {
      body += '<div class="summary-row fail">' + DynamicForm.escapeHtml(r.email || '') + ': ' + DynamicForm.escapeHtml(r.error || 'שגיאה') + '</div>';
    });
    document.getElementById('summaryBody').innerHTML = body;
    document.getElementById('summary').classList.add('show');
  }

  function headerHints() {
    var hints = {};
    formFields.forEach(function (field) {
      hints[field.label.toLowerCase()] = field.key;
      hints[field.airtableField.toLowerCase()] = field.key;
      hints[field.key.toLowerCase()] = field.key;
    });
    hints['מייל'] = 'email';
    hints['נייד'] = 'phone';
    hints['שם'] = 'firstName';
    return hints;
  }

  function parsePaste(text) {
    var lines = text.trim().split(/\r?\n/).filter(function (line) { return line.trim(); });
    if (!lines.length) return;
    var rows = lines.map(function (line) { return line.split('\t'); });
    var first = rows[0];
    var looksLikeHeader = first.every(function (cell) { return !cell.includes('@') && !/^\d{9,}$/.test(cell.trim()); });
    pastedHeaders = looksLikeHeader ? first.map(function (c) { return c.trim(); }) : first.map(function (_, i) { return 'עמודה ' + (i + 1); });
    pastedRows = looksLikeHeader ? rows.slice(1) : rows;
    if (pastedRows.length) openMapModal();
  }

  function openMapModal() {
    var hints = headerHints();
    document.getElementById('mapPreview').textContent = pastedRows.length + ' שורות\n' + pastedRows.slice(0, 3).map(function (r) { return r.join(' | '); }).join('\n');
    var grid = document.getElementById('mapGrid');
    grid.innerHTML = '';
    pastedHeaders.forEach(function (header, colIdx) {
      var label = document.createElement('div');
      label.className = 'col-label';
      label.textContent = header;
      var arrow = document.createElement('div');
      arrow.className = 'arrow';
      arrow.textContent = '←';
      var select = document.createElement('select');
      select.dataset.colIdx = colIdx;
      select.innerHTML = '<option value="">דלג</option>' + formFields.map(function (field) {
        var selected = hints[header.toLowerCase()] === field.key ? ' selected' : '';
        return '<option value="' + DynamicForm.escapeHtml(field.key) + '"' + selected + '>' + DynamicForm.escapeHtml(field.label) + '</option>';
      }).join('');
      grid.appendChild(label);
      grid.appendChild(arrow);
      grid.appendChild(select);
    });
    document.getElementById('mapModal').classList.add('open');
  }

  function closeMapModal() {
    document.getElementById('mapModal').classList.remove('open');
    pastedRows = [];
    pastedHeaders = [];
  }

  function applyPasteMapping() {
    var mapping = {};
    [].slice.call(document.querySelectorAll('#mapGrid select')).forEach(function (select) {
      if (select.value) mapping[select.dataset.colIdx] = select.value;
    });
    document.querySelectorAll('#bulkBody tr').forEach(function (tr) {
      if (!DynamicForm.collectBulkRow(tr, formFields).hasAny) tr.remove();
    });
    pastedRows.forEach(function (cols) {
      var data = {};
      Object.keys(mapping).forEach(function (colIdx) {
        data[mapping[colIdx]] = (cols[colIdx] || '').trim();
      });
      addRow(data);
    });
    closeMapModal();
  }

  document.getElementById('btnAddRow').addEventListener('click', function () { addRow(); });
  document.getElementById('btnSubmitAll').addEventListener('click', submitAll);
  document.getElementById('btnApplyMapping').addEventListener('click', applyPasteMapping);
  document.getElementById('btnCloseMapping').addEventListener('click', closeMapModal);
  document.getElementById('bulkTable').addEventListener('paste', function (event) {
    var text = event.clipboardData.getData('text/plain');
    if (!text.trim()) return;
    event.preventDefault();
    parsePaste(text);
  });

  async function init() {
    try {
      var config = await MatzmihimApi.getConfig();
      formFields = MatzmihimConfig.fieldsFor(config, 'bulk');
    } catch (err) {
      formFields = MatzmihimConfig.fieldsFor(MatzmihimConfig.DEFAULT_FIELDS, 'bulk');
      showError('נטענה הרשמה מרובה בברירת מחדל כי לא ניתן היה לטעון קונפיג: ' + err.message);
    }
    renderHeader();
    for (var i = 0; i < 10; i++) addRow();
  }

  init();
</script>
</body>
</html>
