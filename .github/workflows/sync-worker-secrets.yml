name: Sync Worker Secrets

on:
  workflow_dispatch:

jobs:
  sync-worker-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install --global wrangler

      - name: Sync secrets to Cloudflare Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          FORM_CONFIG_TABLE_ID: ${{ secrets.FORM_CONFIG_TABLE_ID }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          BUBBLE_URL: ${{ secrets.BUBBLE_URL }}
          BUBBLE_TOKEN: ${{ secrets.BUBBLE_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$AIRTABLE_TOKEN" | wrangler secret put AIRTABLE_TOKEN
          printf '%s' "$AIRTABLE_BASE" | wrangler secret put AIRTABLE_BASE
          printf '%s' "$FORM_CONFIG_TABLE_ID" | wrangler secret put FORM_CONFIG_TABLE_ID
          printf '%s' "$ADMIN_PASSWORD_HASH" | wrangler secret put ADMIN_PASSWORD_HASH
          printf '%s' "$SESSION_SECRET" | wrangler secret put SESSION_SECRET
          printf '%s' "$BUBBLE_URL" | wrangler secret put BUBBLE_URL
          printf '%s' "$BUBBLE_TOKEN" | wrangler secret put BUBBLE_TOKEN
